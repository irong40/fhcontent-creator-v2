<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>End Card — History Unveiled VA</title>
    <link rel="stylesheet" href="brand.css">
</head>
<body>
<div class="huva-card huva-card--navy" data-template="end-card">
    <div class="huva-paper-grain"></div>

    <header style="text-align:center;">
        <div class="huva-eyebrow" style="margin-top:64px;">History Unveiled VA</div>
    </header>

    <main style="margin:auto 0;text-align:center;">
        <div style="font-family:var(--huva-serif);font-style:italic;font-weight:500;font-size:96px;line-height:1.18;max-width:880px;margin:0 auto;">
            That&rsquo;s another piece of <span class="huva-highlight">Virginia</span> uncovered.
        </div>
        <div style="font-family:var(--huva-sans);font-weight:500;font-size:36px;color:var(--huva-bone);margin-top:48px;letter-spacing:0.04em;">
            Until next time &mdash; the story isn&rsquo;t over.
        </div>
        <div style="margin-top:96px;display:flex;justify-content:center;gap:16px;align-items:center;">
            <div style="width:96px;height:2px;background:var(--huva-old-gold);"></div>
            <div style="font-family:var(--huva-serif);font-weight:600;font-size:42px;letter-spacing:0.04em;">HUVA</div>
            <div style="width:96px;height:2px;background:var(--huva-old-gold);"></div>
        </div>
    </main>

    <footer style="text-align:center;color:var(--huva-old-gold);font-family:var(--huva-sans);font-weight:600;font-size:22px;letter-spacing:0.18em;text-transform:uppercase;">
        Dr. Imani Carter &nbsp;&middot;&nbsp; Public Historian
    </footer>
</div>
</body>
</html>
