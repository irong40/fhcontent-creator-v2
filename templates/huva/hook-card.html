<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{title}} — History Unveiled VA</title>
    <link rel="stylesheet" href="brand.css">
</head>
<body>
<div class="huva-card huva-card--navy" data-template="hook-card">
    <div class="huva-paper-grain"></div>

    <header style="display:flex;justify-content:space-between;align-items:flex-start;gap:32px;">
        <div class="huva-eyebrow">History Unveiled VA</div>
        <div class="huva-location-tag">{{location}}</div>
    </header>

    <main style="margin-top:auto;margin-bottom:auto;">
        <h1 class="huva-title">{{title}}</h1>
        <p class="huva-subtitle" style="margin-top:48px;max-width:880px;">{{hook}}</p>
    </main>

    <footer class="huva-anchor">
        <div class="huva-anchor__rule"></div>
        <div>
            <div class="huva-anchor__mark">Dr. Imani Carter</div>
            <div class="huva-anchor__sub">Public Historian</div>
        </div>
    </footer>
</div>
</body>
</html>
